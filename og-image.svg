<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CoinNavigator</title>
  <desc id="desc">Real-time crypto arbitrage opportunities, calculators, and market guides.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f1a"/>
      <stop offset="100%" stop-color="#151e35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="210" cy="160" r="180" fill="#6366f1" opacity="0.14" filter="url(#glow)"/>
  <circle cx="980" cy="510" r="220" fill="#10b981" opacity="0.14" filter="url(#glow)"/>

  <g stroke="rgba(255,255,255,0.12)" stroke-width="1">
    <path d="M0 120H1200"/>
    <path d="M0 250H1200"/>
    <path d="M0 380H1200"/>
    <path d="M0 510H1200"/>
    <path d="M220 0V630"/>
    <path d="M440 0V630"/>
    <path d="M660 0V630"/>
    <path d="M880 0V630"/>
    <path d="M1100 0V630"/>
  </g>

  <rect x="90" y="115" width="1020" height="400" rx="28" fill="rgba(9,12,22,0.78)" stroke="rgba(129,140,248,0.42)" stroke-width="2"/>
  <rect x="125" y="155" width="500" height="16" rx="8" fill="#818cf8"/>
  <rect x="125" y="188" width="360" height="12" rx="6" fill="#475569"/>
  <rect x="125" y="248" width="900" height="8" rx="4" fill="#1e293b"/>
  <rect x="125" y="286" width="820" height="8" rx="4" fill="#1e293b"/>
  <rect x="125" y="324" width="860" height="8" rx="4" fill="#1e293b"/>
  <rect x="125" y="380" width="220" height="50" rx="14" fill="url(#accent)"/>
  <rect x="370" y="380" width="230" height="50" rx="14" fill="#1f2937" stroke="#334155" stroke-width="1.5"/>

  <text x="125" y="140" fill="#f8fafc" font-size="62" font-family="Inter, Arial, sans-serif" font-weight="800">CoinNavigator</text>
  <text x="125" y="225" fill="#94a3b8" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="600">Real-time crypto arbitrage monitor</text>
  <text x="420" y="414" fill="#94a3b8" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">Monitor + Calculator + Guides</text>

  <text x="770" y="445" fill="#34d399" font-size="70" font-family="Inter, Arial, sans-serif" font-weight="900">0.3%+</text>
  <text x="770" y="480" fill="#94a3b8" font-size="24" font-family="Inter, Arial, sans-serif" font-weight="600">profitable spread alerts</text>
</svg>

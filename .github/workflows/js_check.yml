name: JS syntax check

on:
  push:
    branches: [main]
    paths:
      - 'assets/js/**'
      - '.github/workflows/js_check.yml'
  pull_request:
    paths:
      - 'assets/js/**'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify JS syntax
        run: |
          for f in assets/js/*.js; do
            node --check "$f"
          done
